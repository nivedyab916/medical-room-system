<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Hostel Medicine</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1 class="logo-title">
        <img src="Images/icons8-student-94.png" alt="Dashboard Icon" class="header-icon">
        Student
    </h1>

    <nav>
      <a href="index.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="issue.html">Issue Medicine</a>
      <a href="history.html">History</a>
      <a href="#" onclick="toggleTheme()">🌙 Theme</a>
    </nav>
  </header>

  <div class="container">

    <div class="section">
      <h2>➕ Add Student</h2>

      <div class="flex">
        <input type="text" id="sName" placeholder="Student Name">
        <input type="text" id="sRoll" placeholder="Roll No">
        <input type="text" id="sRoom" placeholder="Room No">
        <input type="text" id="sPhone" placeholder="Phone No">
        <button onclick="addStudent()">Add</button>
      </div>
    </div>

    <div class="section">
      <h2>📋 Student List</h2>
      <input type="text" id="searchStudent" placeholder="Search by Roll or Name" oninput="renderStudents()">

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>Room</th>
            <th>Phone</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="studentTable"></tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
  <script src="students.js"></script>
</body>
</html>
